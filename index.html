<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #root {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="root">

    </div>
    <script>
        let idx = 0;
        let pattern = [
            `┌( '&nbsp;&nbsp;&nbsp;&nbsp;' )┘`,
            `└( '&nbsp;&nbsp;&nbsp;&nbsp;' )┐`
        ]
        setInterval(function () {
            let root = document.getElementById('root');
            root.innerHTML = pattern[idx];
            idx++;
            idx = idx % 2;
        }, 1000)
    </script>
</body>

</html>
