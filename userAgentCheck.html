<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Detection</title>
</head>

<body>

    <script>
        // 현재 사용자 에이전트 문자열 저장
        var initialUserAgent = navigator.userAgent;

        // 사용자 에이전트 변경 감지 함수
        function checkUserAgentChange() {
            if (navigator.userAgent !== initialUserAgent) {
                // 사용자 에이전트가 변경되었을 때 실행되는 코드
                console.log("UserAgent has changed!");

                // 변경된 사용자 에이전트 업데이트
                initialUserAgent = navigator.userAgent;

                // 추가적인 처리나 로직을 여기에 추가할 수 있습니다.
            }
        }

        // 주기적으로 사용자 에이전트 변경 감지 함수 호출
        setInterval(checkUserAgentChange, 1000); // 1초마다 체크 (원하는 주기로 변경 가능)
    </script>

</body>

</html>
