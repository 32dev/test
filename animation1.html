<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            position: relative;
        }

        .logo::before {
            content: '@32dev';
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 50px;
            color: white;
            background-color: black;
            animation: showRight 1s ease forwards;
            animation-delay: 0.4s;
            line-height:50px;
            text-align:center;
        }

        @keyframes showRight {
            100% {
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="logo">
        
    </div>
</body>

</html>
